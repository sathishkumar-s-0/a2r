kind = "web"
previewPath = "/"
title = "A2R Meat Shop"
version = "1.0.0"
id = "artifacts/a2r-meat-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20755

[services.development]
run = "pnpm --filter @workspace/a2r-meat-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/a2r-meat-shop", "run", "build" ]
publicDir = "artifacts/a2r-meat-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20755"
BASE_PATH = "/"
