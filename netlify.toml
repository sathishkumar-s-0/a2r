[build]
  command = "pnpm install && pnpm run build"
  publish = "artifacts/a2r-meat-shop/dist/public"

[functions]
  directory = "artifacts/a2r-meat-shop/server"
  included_files = ["artifacts/a2r-meat-shop/dist/server/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/netlify"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
